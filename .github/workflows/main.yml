name: CI/CD Pipeline

on:
  push:

env:
  NODE_VERSION: '22.16'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anime_collect?schema=public

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Upload Build Assets
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: '**/dist'
          retention-days: 1

  type-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Build Assets
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run type-check
        run: npm run type-check

  test:
    needs: build
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anime_collect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d anime_collect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      cache:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Build Assets
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply DB schema
        run: npm run prisma:push

      - name: Run tests
        env:
          CACHE_HOST: localhost
          CACHE_PORT: 6379
        run: npm run test